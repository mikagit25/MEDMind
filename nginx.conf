###############################################################################
# MedMind AI — Nginx reverse proxy
# Domain: medmind.pro + www.medmind.pro
# SSL: Let's Encrypt via certbot (webroot method)
###############################################################################

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect + ACME challenge ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name medmind.pro www.medmind.pro;

    # Let's Encrypt webroot challenge — served from shared volume
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # All other HTTP → redirect to HTTPS
    location / {
        return 301 https://medmind.pro$request_uri;
    }
}

# ── www → apex redirect ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.medmind.pro;

    ssl_certificate     /etc/letsencrypt/live/medmind.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medmind.pro/privkey.pem;

    return 301 https://medmind.pro$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name medmind.pro;

    # TLS — Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/medmind.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medmind.pro/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/medmind.pro/chain.pem;

    # Modern SSL configuration (Mozilla Intermediate)
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://sketchfab.com; frame-src 'self' https://sketchfab.com https://human.biodigital.com; img-src 'self' data: https: blob:; style-src 'self' 'unsafe-inline' https:; font-src 'self' https:; connect-src 'self' https://api.anthropic.com https://openi.nlm.nih.gov;" always;

    # Max upload size (images + module import)
    client_max_body_size 25M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── Media files (uploaded images) ────────────────────────────────────────
    location /media/ {
        alias /app/data/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ── API routes → FastAPI backend ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    30s;
    }

    # ── SSE / AI streaming — no buffering ────────────────────────────────────
    location /api/v1/ai/ {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  300s;
        add_header          X-Accel-Buffering no always;
    }

    # ── API Docs (disabled in prod by default, guarded by ENABLE_DOCS) ───────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass       http://backend;
        proxy_set_header Host $host;
    }

    # ── Next.js static assets — long-term cache ───────────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Next.js image optimization ────────────────────────────────────────────
    location /_next/image {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Everything else → Next.js frontend ───────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
