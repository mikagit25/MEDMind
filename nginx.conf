###############################################################################
# MedMind AI — Nginx reverse proxy configuration
# Place this file at /etc/nginx/sites-available/medmind and symlink to
# /etc/nginx/sites-enabled/medmind, or mount via docker-compose.
###############################################################################

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name medmind.ai www.medmind.ai;

    # TLS certificates (use certbot / Let's Encrypt in production)
    ssl_certificate     /etc/letsencrypt/live/medmind.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medmind.ai/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Max upload size (for module JSON import)
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_vary on;

    # ── API routes → FastAPI backend ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts (generous for AI streaming responses)
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    30s;
    }

    # ── SSE streaming — disable buffering ────────────────────────────────────
    location /api/v1/ai/ask/stream {
        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  300s;
        add_header          X-Accel-Buffering no;
    }

    # ── OpenAPI docs ─────────────────────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass       http://backend;
        proxy_set_header Host $host;
    }

    # ── Static files cache ────────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass         http://frontend;
        proxy_cache_valid  200 7d;
        add_header         Cache-Control "public, max-age=604800, immutable";
    }

    # ── Everything else → Next.js frontend ───────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
