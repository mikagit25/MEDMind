services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: medmind_postgres
    environment:
      POSTGRES_USER: medmind
      POSTGRES_PASSWORD: medmind_secret
      POSTGRES_DB: medmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/DB_SCHEMA.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medmind -d medmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medmind_redis
    command: redis-server --appendonly yes --requirepass medmind_redis_secret
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "medmind_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medmind_backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://medmind:medmind_secret@postgres:5432/medmind
      REDIS_URL: redis://:medmind_redis_secret@redis:6379/0
    volumes:
      - ./backend:/app
      - ./Modules:/app/data/modules:ro
      - media_data:/app/data/media   # persistent storage for uploaded images
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medmind_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  media_data:   # uploaded medical images, thumbnails, DICOM exports
