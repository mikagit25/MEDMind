###############################################################################
# MedMind AI — Nginx bootstrap config (HTTP only)
# Used ONLY on first deploy before SSL certificate exists.
# After certbot issues the cert, switch to nginx.conf and reload.
###############################################################################

upstream backend {
    server backend:8000;
    keepalive 16;
}

upstream frontend {
    server frontend:3000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name medmind.pro www.medmind.pro;

    # Serve ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Proxy everything to the app while cert is being issued
    location /api/ {
        proxy_pass       http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass       http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
